name: Generate Android Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-keystore:
    name: Generate release.jks
    runs-on: ubuntu-latest

    steps:
      - name: Validate password secrets
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "::error::Missing repository secret: ANDROID_KEYSTORE_PASSWORD"
            missing=1
          fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Missing repository secret: ANDROID_KEY_ALIAS"
            missing=1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Missing repository secret: ANDROID_KEY_PASSWORD"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Configure the missing secrets, then run this workflow again."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore and base64 secret value
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p keystore-output

          keytool -genkeypair \
            -v \
            -keystore keystore-output/release.jks \
            -storetype JKS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "$ANDROID_KEY_ALIAS" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -dname "CN=howie110, OU=aowugong-ootd, O=howie110, L=Unknown, ST=Unknown, C=CN"

          base64 -w 0 keystore-output/release.jks > keystore-output/ANDROID_KEYSTORE_BASE64.txt

          cat > keystore-output/README.txt <<'EOF'
          This artifact is sensitive.

          1. Copy the entire contents of ANDROID_KEYSTORE_BASE64.txt.
          2. Add it to GitHub repository secrets as ANDROID_KEYSTORE_BASE64.
          3. Keep release.jks and the passwords in a safe password manager or offline backup.
          4. Delete this workflow run/artifact before making the repository public.

          Do not commit release.jks or this artifact to git.
          EOF

      - name: Upload private keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-keystore-private
          path: keystore-output/
          retention-days: 1
