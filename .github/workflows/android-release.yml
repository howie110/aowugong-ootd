name: Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release, for example v1.0.6"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Generate Android signing files
        run: |
          mkdir -p android/keystore

          keytool -genkeypair \
            -v \
            -keystore android/keystore/release.jks \
            -storetype JKS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "aowugong" \
            -storepass "aowugong" \
            -keypass "aowugong" \
            -dname "CN=howie110, OU=aowugong-ootd, O=howie110, L=Unknown, ST=Unknown, C=CN"

          {
            echo "storeFile=keystore/release.jks"
            echo "storePassword=aowugong"
            echo "keyAlias=aowugong"
            echo "keyPassword=aowugong"
          } > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release asset
        id: asset
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          mkdir -p release
          VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          APK_NAME="daily-ootd-${TAG_NAME}-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "release/${APK_NAME}"
          echo "apk_path=release/${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          APK_PATH: ${{ steps.asset.outputs.apk_path }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$APK_PATH" --title "$TAG_NAME" --generate-notes
          fi
