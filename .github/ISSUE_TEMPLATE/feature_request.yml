name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: Describe the user need or workflow.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: What should the app do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Home and filtering
        - Detail editing
        - Option management
        - Backup and import
        - Privacy or security
        - Release or installation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add examples or screenshots only if they do not include private data.
