name: Bug report
description: Report a reproducible problem in the app.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please avoid sharing private photos, backup ZIP files, tokens, or personal paths.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "v1.0.8"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: "Example: Pixel 8, Android 15"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add logs or screenshots only if they do not include private data.
